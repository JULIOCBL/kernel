kotlin.code.style=official
# El proyecto esta orientado a Java 21. Si Kotlin/Gradle llega a fallar con
# mensajes como `IllegalArgumentException: 25.0.2`, normalmente hay un daemon
# viejo contaminado con otro JDK. La salida rapida es ejecutar:
# `./gradlew --stop`
org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
